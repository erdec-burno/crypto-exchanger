name: ${WEB_EXCHANGER}

services:
  dashboard:
    image: ${DASHBOARD_IMAGE:-dashboard:latest}
    build:
      context: ..
      dockerfile: deploy/docker/dashboard.Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${DASHBOARD_PORT:-3002}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
